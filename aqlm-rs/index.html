<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /** {
            outline: 1px solid red;
        }*/
        * {
            font-family: -apple-system,BlinkMacSystemFont,Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif,Helvetica Neue,Arial,"Apple Color Emoji","Segoe UI Emoji",Segoe UI Symbol,"Noto Color Emoji";
        }
        html {
            height: 100%;
        }
        body {
            padding: 0px;
            margin: 0px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            flex-direction: column;
        }
        #title {
            padding-left: 10px;
            font-size: 26px;
        }
        #chat {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .message {
            display: inline-block;
            text-wrap: wrap;
            text-wrap-mode: wrap;
            text-wrap-style: stable;
            max-width: 40%;
            background: #f1f1f1;
            margin: 8px;
            padding: 14px;
            border-radius: 12px;
            font-size: 18px;
        }
        .user-message-row {
            display: flex;
            flex-direction: row-reverse;
        }
        .ai-message-row {
            display: flex;
            flex-direction: row;
        }
        #user-input-form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        #user-input {
            width: 100%;
            background: #f1f1f1;
            height: 36px;
            border-radius: 23px;
            border: none;
            padding-top: 0px;
            padding-bottom: 0px;
            padding-left: 23px;
            font-size: 16px;
        }
        #user-input-button {
            height: 36px;
            width: 36px;
            min-width: 36px;
            border-radius: 23px;
            border: none;
            padding: 0px;
            margin-left: 10px;
            font-size: 18px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <h2 id="title">AQLM.rs</h2>
    <div id="chat">
    </div>
    <form id="user-input-form">
        <input id="user-input" type="text">
        <button id="user-input-button">
            <i class="fa-solid fa-arrow-up"></i>
        </button>
    </form>
    <script type="module" type="text/javascript">

        let messages = [];
        let inputDisabled = false;
        
        function displayMessage(message, type) {
            const chat = document.getElementById('chat');
            const messageRow = document.createElement('div');
            messageRow.classList.add(type === 'User' ? 'user-message-row' : 'ai-message-row');
            const messageSpan = document.createElement('span');
            messageSpan.classList.add('message');
            messageSpan.textContent = message;
            messageRow.appendChild(messageSpan);
            chat.appendChild(messageRow);
        }

        function displayMessages(messages) {
            const chat = document.getElementById('chat');
            while (chat.firstChild) {
                chat.removeChild(chat.lastChild);
            }
            messages.forEach(msg => {
                console.log(msg.content, msg.role);
                displayMessage(msg.content, msg.role)
            });
        }

        const worker = new Worker(new URL('./assets/worker-iSJVy5qS.js', import.meta.url))

        document.getElementById('user-input-form').addEventListener('submit', function(event) {
            event.preventDefault();

            if (inputDisabled) {
                return;
            }

            let userInput = document.getElementById('user-input').value;
            document.getElementById('user-input').value = '';

            if (userInput === "") {
                userInput = " ";
            }

            messages.push({
                "role": "User",
                "content": userInput,
            });

            console.log(messages);

            displayMessages(messages);

            worker.postMessage(messages);
            inputDisabled = true;
        });

        worker.onmessage = (e) => {
            console.log(e.data);
            messages = e.data.messages;
            displayMessages(messages);
            if (e.data.is_finished) {
                inputDisabled = false;
            }
        };
    </script>
</body>
</html>
