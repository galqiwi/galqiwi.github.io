    <style>
        /** {*/
        /*    outline: 1px solid red;*/
        /*}*/
        * {
            font-family: -apple-system,BlinkMacSystemFont,Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif,Helvetica Neue,Arial,"Apple Color Emoji","Segoe UI Emoji",Segoe UI Symbol,"Noto Color Emoji";
        }
        a {
            color: black;
        }
        html {
            height: 100%;
        }
        body {
            padding: 0px;
            margin: 0px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            flex-direction: column;
        }
        #title {
            padding-left: 20px;
            font-size: 26px;
        }
        #title > a {
            text-decoration: none;
        }
        .message {
            display: inline-block;
            text-wrap: wrap;
            text-wrap-mode: wrap;
            text-wrap-style: stable;
            max-width: 40%;
            background: #f1f1f1;
            margin: 8px;
            padding: 14px;
            border-radius: 12px;
            font-size: 18px;
        }
        .user-message-row {
            display: flex;
            flex-direction: row-reverse;
        }
        .ai-message-row {
            display: flex;
            flex-direction: row;
        }
        #user-input-form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }
        #user-input {
            width: 100%;
            background: #f1f1f1;
            height: 44px;
            border-radius: 22px;
            border: none;
            padding-top: 0px;
            padding-bottom: 0px;
            padding-left: 23px;
            font-size: 16px;
        }
        #user-input-button {
            height: 44px;
            width: 44px;
            min-width: 44px;
            border-radius: 22px;
            border: none;
            padding: 0px;
            margin-left: 12px;
            font-size: 22px;
        }
        #clear-button {
            height: 44px;
            width: 44px;
            min-width: 44px;
            border-radius: 22px;
            border: none;
            padding: 0px;
            margin-right: 12px;
            font-size: 22px;
        }
        .clear-button-hidden {
            display: none;
        }
        #description {
            padding: 20px;
            height: 40%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        #description > h2 {
            font-size: 26px;
        }
        .description-hidden {
            display: none;
        }
        .inactive-button {
            color: #aaa;
        }

        input:focus,
        select:focus,
        textarea:focus,
        button:focus {
            outline: none;
        }

        .chat-hidden {
            display: none;
        }
        .chat-visible {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #chat-title {
            text-align: center;
            margin-bottom: 60px;
        }
        .chat-title-hidden {
            display: none;
        }

        #user-input-width-limiter {
            width: 100%;
        }
        .user-input-width-limiter-active {
            max-width: 700px;
        }

        #user-input-height-limiter {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .user-input-height-limiter-active {
            height: 100%;
        }
    </style>

    <style>
        #header {
            display: flex;
            padding-left: 20px;
            padding-right: 20px;
            justify-content: space-between;
            flex-direction: row;
            border-bottom: 1px solid #e6e6e6;
        }

        #header a {
            text-decoration: none;
        }

        #header a:hover {
            text-decoration: underline;
        }

        #header-items {
            display: flex;
        }
        .header-items-horizontal {
            flex-direction: row;
        }
        .header-items-vertical {
            flex-direction: column;
        }
        .header-item {
            height: 60px;
            display: flex;
            justify-content: center;
            flex-direction: column;
        }
        .header-not-first-item {
        }
        .header-not-first-item-horizontal {

        }

        .header-first-item a {
            font-size: 20px;
            /*font-weight: bold;*/
        }

        .header-item a {
            font-size: 20px;
        }
    </style>

    <div id="user-input-width-limiter" class="user-input-width-limiter-active">
        <div id="chat-title">
            <h1>Run Llama-3.1-8B directly in a browser</h1>
